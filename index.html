<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Tennis Replay - v1.0.5</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #121212; --text-muted: #888; }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        #app { text-align: center; width: 100%; max-width: 450px; padding: 20px; position: relative; }
        
        /* Header com Versão */
        .app-header { margin-bottom: 15px; }
        .app-header h1 { font-size: 1.2rem; margin: 0; color: var(--primary); }
        .version-badge { font-size: 0.7rem; background: #333; padding: 2px 8px; border-radius: 10px; color: var(--text-muted); }

        .video-container {
            position: relative; width: 100%; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000;
        }
        video { width: 100%; display: block; background: #000; }
        .mirror { transform: scaleX(-1); }

        .rec-indicator {
            position: absolute; top: 15px; left: 15px; display: flex; align-items: center;
            background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; font-size: 12px;
        }
        .dot { width: 8px; height: 8px; background: #ff5252; border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; }
        
        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .btn-save {
            width: 100px; height: 100px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--primary), #00c853);
            color: #003300; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
            transition: transform 0.1s;
        }
        .btn-save:active { transform: scale(0.9); }
        .btn-save:disabled { background: #444; color: #888; box-shadow: none; opacity: 0.5; }

        .btn-switch {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 13px;
        }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; z-index: 100;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="app">
    <div class="app-header">
        <h1>REPLAY RECORDER <span class="version-badge">v1.0.5</span></h1>
    </div>

    <div v-if="showToast" class="toast">✔️ LANCE SALVO!</div>

    <div class="video-container">
        <div class="rec-indicator" v-if="cameraReady">
            <div class="dot"></div> BUFFER: {{ rollingBuffer.length }}s / 30s
        </div>
        <video ref="videoPreview" :class="{ mirror: facingMode === 'user' }" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button class="btn-save" @click="saveReplay" :disabled="!cameraReady || isSaving">
            {{ isSaving ? '...' : 'SALVAR' }}
        </button>
        
        <button class="btn-switch" @click="toggleCamera">
            🔄 Inverter Câmera
        </button>
    </div>
</div>

<script>
new Vue({
    el: '#app',
    data: {
        version: '1.0.5',
        cameraReady: false,
        isSaving: false,
        showToast: false,
        mediaRecorder: null,
        headerChunk: null, // Guardará o primeiro segundo (Metadata)
        rollingBuffer: [], // Guardará os últimos 30 segundos
        stream: null,
        facingMode: 'environment'
    },
    methods: {
        async initCamera() {
            this.cameraReady = false;
            if (this.stream) {
                this.stream.getTracks().forEach(track => track.stop());
            }

            try {
                this.stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: this.facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: true 
                });
                
                this.$refs.videoPreview.srcObject = this.stream;
                this.setupRecorder();
                this.cameraReady = true;
            } catch (err) {
                alert("Erro ao acessar câmera: " + err.message);
            }
        },

        setupRecorder() {
            // Reinicia os buffers ao configurar novo recorder
            this.headerChunk = null;
            this.rollingBuffer = [];

            const options = { mimeType: 'video/webm;codecs=vp8,opus' };
            this.mediaRecorder = new MediaRecorder(this.stream, options);

            this.mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    // O segredo v1.0.5: O primeiro pedaço nunca é descartado
                    if (!this.headerChunk) {
                        this.headerChunk = event.data;
                    } else {
                        this.rollingBuffer.push(event.data);
                        if (this.rollingBuffer.length > 30) {
                            this.rollingBuffer.shift();
                        }
                    }
                }
            };
            this.mediaRecorder.start(1000);

            // Controle via MediaSession (Botão de Play/Pause de fones)
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', this.saveReplay);
                navigator.mediaSession.setActionHandler('pause', this.saveReplay);
            }
        },

        toggleCamera() {
            this.facingMode = this.facingMode === 'user' ? 'environment' : 'user';
            this.initCamera();
        },

        saveReplay() {
            if (this.isSaving || this.rollingBuffer.length < 2) return;
            this.isSaving = true;
            
            // Concatena: Header (Metadados) + Rolling Buffer (Ação)
            const finalBlob = new Blob([this.headerChunk, ...this.rollingBuffer], { type: 'video/webm' });
            const url = URL.createObjectURL(finalBlob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `replay-${Date.now()}.webm`;
            a.click();

            this.showToast = true;
            setTimeout(() => { 
                this.showToast = false;
                this.isSaving = false;
            }, 3000);
        }
    },
    mounted() {
        this.initCamera();
        
        // Atalho para controles Bluetooth (Teclado)
        window.addEventListener('keydown', (e) => {
            const keys = ['Enter', ' ', 'VolumeUp', 'VolumeDown', 'ArrowUp', 'ArrowDown'];
            if (keys.includes(e.key)) {
                this.saveReplay();
            }
        });
    }
});
</script>
</body>
</html>
