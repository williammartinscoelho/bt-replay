<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Replay - Dual Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <style>
        :root { --primary: #00e676; --secondary: #2196f3; --danger: #ff5252; --bg: #121212; }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        #app { text-align: center; width: 100%; max-width: 500px; padding: 20px; }
        
        .video-container {
            position: relative; width: 100%; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000;
        }
        video { width: 100%; display: block; background: #000; }
        .mirror { transform: scaleX(-1); } /* Espelhar apenas a frontal */

        .rec-indicator {
            position: absolute; top: 15px; left: 15px; display: flex; align-items: center;
            background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 14px;
        }
        .dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        
        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .btn-save {
            width: 100px; height: 100px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--primary), #00c853);
            color: #003300; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }

        .btn-switch {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 14px;
        }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; z-index: 100;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="app">
    <div v-if="showToast" class="toast">🔥 REPLAY SALVO!</div>

    <div class="video-container">
        <div class="rec-indicator" v-if="cameraReady">
            <div class="dot"></div> {{ videoChunks.length }}s
        </div>
        <video ref="videoPreview" :class="{ mirror: facingMode === 'user' }" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button class="btn-save" @click="saveReplay" :disabled="!cameraReady || isSaving">
            {{ isSaving ? '...' : 'SALVAR' }}
        </button>
        
        <button class="btn-switch" @click="toggleCamera" :disabled="isSaving">
            📷 Alternar para Câmera {{ facingMode === 'user' ? 'Traseira' : 'Frontal' }}
        </button>
    </div>
</div>

<script>
new Vue({
    el: '#app',
    data: {
        cameraReady: false,
        isSaving: false,
        showToast: false,
        mediaRecorder: null,
        videoChunks: [],
        stream: null,
        facingMode: 'environment' // 'user' para frontal, 'environment' para traseira
    },
    methods: {
        async initCamera() {
            this.cameraReady = false;
            
            // 1. Limpa o stream e o recorder anterior se existirem
            if (this.stream) {
                this.stream.getTracks().forEach(track => track.stop());
            }
            if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                this.mediaRecorder.stop();
            }

            try {
                this.stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: this.facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: true 
                });
                
                this.$refs.videoPreview.srcObject = this.stream;
                this.setupRecorder();
                this.cameraReady = true;
            } catch (err) {
                alert("Erro ao acessar câmera: " + err.message);
            }
        },

        toggleCamera() {
            // Alterna o modo e reinicia a câmera
            this.facingMode = this.facingMode === 'user' ? 'environment' : 'user';
            this.videoChunks = []; // Limpa o buffer ao trocar de câmera
            this.initCamera();
        },

        setupRecorder() {
            const formats = ['video/mp4;codecs=avc1', 'video/mp4', 'video/webm'];
            const selectedType = formats.find(type => MediaRecorder.isTypeSupported(type));
            
            this.mediaRecorder = new MediaRecorder(this.stream, { mimeType: selectedType });
            this.mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    this.videoChunks.push(event.data);
                    if (this.videoChunks.length > 30) this.videoChunks.shift();
                }
            };
            this.mediaRecorder.start(1000);

            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', this.saveReplay);
                navigator.mediaSession.setActionHandler('pause', this.saveReplay);
            }
        },

        saveReplay() {
            if (this.isSaving || this.videoChunks.length < 2) return;
            this.isSaving = true;
            
            const actualMime = this.videoChunks[0].type;
            const extension = actualMime.includes('mp4') ? 'mp4' : 'webm';
            const blob = new Blob(this.videoChunks, { type: actualMime });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `replay-${Date.now()}.${extension}`;
            a.click();

            this.showToast = true;
            setTimeout(() => { 
                this.showToast = false;
                this.isSaving = false;
            }, 3000);
        }
    },
    mounted() {
        this.initCamera();
        window.addEventListener('keydown', (e) => {
            if (['Enter', ' ', 'VolumeUp', 'VolumeDown'].includes(e.key)) this.saveReplay();
        });
    }
});
</script>
</body>
</html>
