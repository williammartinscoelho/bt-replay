<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Tennis - Replay Fixo</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #app { text-align: center; width: 100%; max-width: 450px; padding: 20px; }
        .video-container { position: relative; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; }
        .mirror { transform: scaleX(-1); }
        .rec-indicator { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; }
        .dot { width: 8px; height: 8px; background: #ff5252; border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn-save { width: 90px; height: 90px; border-radius: 50%; border: none; background: var(--primary); color: #003300; font-weight: bold; cursor: pointer; }
        .btn-switch { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="app">
    <div class="video-container">
        <div class="rec-indicator" v-if="cameraReady">
            <div class="dot"></div> BUFFER: {{ rollingBuffer.length }}s
        </div>
        <video ref="videoPreview" :class="{ mirror: facingMode === 'user' }" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button class="btn-save" @click="saveReplay" :disabled="!cameraReady || isSaving">
            {{ isSaving ? '...' : 'SALVAR' }}
        </button>
        <button class="btn-switch" @click="toggleCamera">🔄 Inverter Câmera</button>
    </div>
</div>

<script>
new Vue({
    el: '#app',
    data: {
        cameraReady: false,
        isSaving: false,
        mediaRecorder: null,
        headerChunk: null, // O "DNA" do vídeo (primeiro segundo)
        rollingBuffer: [], // Os últimos 30 segundos
        stream: null,
        facingMode: 'environment'
    },
    methods: {
        async initCamera() {
            if (this.stream) this.stream.getTracks().forEach(t => t.stop());
            try {
                this.stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: this.facingMode, width: 1280, height: 720 }, 
                    audio: true 
                });
                this.$refs.videoPreview.srcObject = this.stream;
                this.setupRecorder();
                this.cameraReady = true;
            } catch (err) { alert(err.message); }
        },

        setupRecorder() {
            // Reinicia os buffers
            this.headerChunk = null;
            this.rollingBuffer = [];

            const options = { mimeType: 'video/webm;codecs=vp8,opus' };
            this.mediaRecorder = new MediaRecorder(this.stream, options);

            this.mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    // O primeiro chunk que chega é o Header
                    if (!this.headerChunk) {
                        this.headerChunk = event.data;
                    } else {
                        this.rollingBuffer.push(event.data);
                        // Mantém 30 segundos no buffer rotativo
                        if (this.rollingBuffer.length > 30) {
                            this.rollingBuffer.shift();
                        }
                    }
                }
            };
            this.mediaRecorder.start(1000);
        },

        saveReplay() {
            if (this.isSaving || this.rollingBuffer.length < 2) return;
            this.isSaving = true;

            // MONTAGEM DO ARQUIVO: Header + Buffer Rotativo
            const finalBlob = new Blob([this.headerChunk, ...this.rollingBuffer], { type: 'video/webm' });
            
            const url = URL.createObjectURL(finalBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `replay-${Date.now()}.webm`;
            a.click();

            setTimeout(() => { this.isSaving = false; }, 2000);
        },

        toggleCamera() {
            this.facingMode = this.facingMode === 'user' ? 'environment' : 'user';
            this.initCamera();
        }
    },
    mounted() {
        this.initCamera();
        window.addEventListener('keydown', (e) => {
            if (['Enter', ' ', 'VolumeUp', 'VolumeDown'].includes(e.key)) this.saveReplay();
        });
    }
});
</script>
</body>
</html>
